        // ==================== 3. 主页数据加载 ====================
        async function initPublicPage() {
            await loadPublicData();

        async function loadPublicPromos() {
            const { data } = await supabaseClient.from('domochi_promos').select('*').eq('is_active', true).order('id', { ascending: false });
            const wrapper = document.getElementById('sliderWrapper');
            const dotsContainer = document.getElementById('sliderDots');
            if (!wrapper || !data || data.length === 0) return;

            wrapper.innerHTML = '';
            dotsContainer.innerHTML = '';
            
            data.forEach((promo, i) => {
                wrapper.innerHTML += `
                    <a href="${promo.link_url}?lang=${currentLang}" class="slide-item">
                        <img src="${promo.image_url}" alt="${promo.title}">
                        <div class="slide-info-overlay">
                            <span class="slide-tag">${promo.tag_text}</span>
                            <span class="slide-title">${promo.title}</span>
                            <span class="slide-sub">${promo.subtitle || ''}</span>
                        </div>
                    </a>`;
                const dot = document.createElement('div');
                dot.className = i === 0 ? 'dot active' : 'dot';
                dot.onclick = () => window.goToSlide(i);
                dotsContainer.appendChild(dot);
            });

            const slides = document.querySelectorAll('.slide-item');
            const dots = document.querySelectorAll('.dot');
            let currentIndex = 0;
            
            window.goToSlide = function(index) {
                currentIndex = (index >= slides.length) ? 0 : (index < 0 ? slides.length - 1 : index);
                wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
                dots.forEach(d => d.classList.remove('active'));
                if(dots[currentIndex]) dots[currentIndex].classList.add('active');
            }
            if(window.sliderTimer) clearInterval(window.sliderTimer);
            window.sliderTimer = setInterval(() => window.goToSlide(currentIndex + 1), 3500);
        }

        async function loadPublicData() {
            try {
                const { data: settings } = await supabaseClient.from('domochi_settings').select('*');
                if (settings) {
                    const getVal = (key) => { 
                        const s = settings.find(x => x.setting_key === key); 
                        return s ? (currentLang === 'en' ? (s.value_en || s.value_it) : s.value_it) : ''; 
                    };
                    
                    const footerMsg = getVal('footer_notice');
                    const customHours = getVal('custom_hours'); 

                    if(footerMsg) document.getElementById('live-activity').innerText = footerMsg;
                    if(customHours) {
                        const hoursHtml = customHours.replace(/\n/g, '<br>');
                        document.querySelector('.info-block div').innerHTML = `

                            <p style="display:block; padding:15px; background:rgba(255,255,255,0.7); line-height:1.8;">${hoursHtml}</p>
                        `;
                    }
                }
            } catch (err) { console.warn("Failed loading CMS settings"); }
        }

        async function handleLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const errorEl = document.getElementById('login-error');
            if (!user || !pass) return;
            
            try {
                const { data } = await supabaseClient.from('domochi_admins').select('*').eq('username', user).eq('password', pass).single();
                if (data) {
                    sessionStorage.setItem('domochi_session', 'active');
                    sessionStorage.setItem('admin_user', user);
                    sessionStorage.setItem('admin_role', data.role || 'editor'); 
                    renderAdminDashboard();
                } else {
                    errorEl.style.display = 'block';
                }
            } catch (err) { errorEl.innerText = "Errore server."; errorEl.style.display = 'block'; }
        }

                                <div class="cms-form-group"><label>Username</label><input type="text" id="new-m-usr" class="cms-input"></div>
                                <div class="cms-form-group"><label>Password Initial</label><input type="password" id="new-m-pwd" class="cms-input"></div>
                                <div class="cms-form-group">
                                    <label>Ruolo (权限)</label>
                                    <select id="new-m-role" class="cms-input"><option value="editor">Editor</option><option value="superadmin">SuperAdmin</option></select>
                                </div>
                                <button class="cms-btn" onclick="addNewStaff()" style="background:#2E624C;">AGGIUNGI STAFF</button>
                            </div>` : ''}
                        </div>

                        <div style="margin-top:30px;">
                            <h3>Staff List (员工名单及权限管理)</h3>
                            <div id="staff-list-container" style="margin-top:15px;">Caricamento...</div>
                        </div>
                    </div>
                </div>
            `;
            updateSubcatDropdown();
            fetchCMSSettings();
            fetchCMSProducts();
            fetchCMSPromos();
            fetchStaffList();
        }

        window.switchTab = function(tabId, btnElement) {
            document.querySelectorAll('.cms-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.cms-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btnElement.classList.add('active');
        };

        window.updateSubcatDropdown = function() {
            const mainCat = document.getElementById('prod-cat').value;
            const subcatSelect = document.getElementById('prod-subcat');
            if(subcategoriesMap[mainCat]) {
                subcatSelect.innerHTML = subcategoriesMap[mainCat].map(s => `<option value="${s.val}">${s.txt}</option>`).join('');
            }
            document.getElementById('temp-settings').style.display = (mainCat === 'drinks') ? 'block' : 'none';
        }

        // ==================== 产品列表逻辑 ====================
        let allProductsCache = [];
        async function fetchCMSProducts() {
            const { data } = await supabaseClient.from('domochi_products').select('*').order('sort_order', { ascending: true }).order('id', { ascending: false });
            allProductsCache = data || [];
            renderFilteredProducts();
        }
        window.renderFilteredProducts = function() {
            const filterValue = document.getElementById('filter-cat').value;
            const container = document.getElementById('cms-product-list');
            const filtered = filterValue === 'all' ? allProductsCache : allProductsCache.filter(p => p.category === filterValue);
            container.innerHTML = filtered.map(p => `
                <div class="list-card">
                    <img src="${p.image_url}" class="list-img">
                    <div class="list-info">
                        <b>${p.name_it}</b><br>
                        <small>${p.category} > ${p.subcategory}</small> | <small style="color:#DF4F53;"><b>排位: ${p.sort_order || 0}</b></small><br>
                        <span class="badge" style="background:${p.is_available ? '#2E624C' : '#888'}">
                            ${p.is_available ? 'ONLINE' : 'OFFLINE'}
                        </span>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button class="action-btn" onclick="editProduct(${p.id})">Edit</button>
                        <button class="action-btn" style="background:${p.is_available ? '#8A7366' : '#2E624C'}; color:white;" onclick="updateOnlineStatus(${p.id}, ${p.is_available})">
                            ${p.is_available ? 'Metti Offline' : 'Metti Online'}
                        </button>
                        <button class="action-btn" style="background:#DF4F53; color:#fff;" onclick="deleteProduct(${p.id})">Del</button>
                    </div>
                </div>`).join('');
        }
        window.updateOnlineStatus = async (id, currentStatus) => {
            const { error } = await supabaseClient.from('domochi_products').update({ is_available: !currentStatus }).eq('id', id);
            if(error) alert(error.message); else fetchCMSProducts();
        }

        // --- 员工管理逻辑 ---
        async function fetchStaffList() {
            const container = document.getElementById('staff-list-container');
            if(!container) return;
            const isSuper = sessionStorage.getItem('admin_role') === 'superadmin';
            const { data } = await supabaseClient.from('domochi_admins').select('*').order('id', { ascending: true });
            if(!data) return;
            container.innerHTML = data.map(m => `
                <div class="list-card" style="padding:15px;">
                    <div class="list-info">
                        <strong>${m.username}</strong> <span class="badge" style="background:${m.role==='superadmin'?'#DF4F53':'#8A7366'}">${m.role}</span>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        ${isSuper && m.username !== 'admin' ? `
                            <select class="cms-input" style="width:130px; margin:0; padding:5px;" onchange="updateStaffRole(${m.id}, this.value)">
                                <option value="editor" ${m.role==='editor'?'selected':''}>Editor</option>
                                <option value="superadmin" ${m.role==='superadmin'?'selected':''}>SuperAdmin</option>
                            </select>
                            <button class="action-btn" style="background:#d33515; color:white; margin:0;" onclick="deleteStaff(${m.id})">Elimina</button>
                        ` : (m.username === 'admin' ? '<i>System Default</i>' : '')}
                    </div>
                </div>`).join('');
        }
        async function addNewStaff() {
            const u = document.getElementById('new-m-usr').value.trim();
            const p = document.getElementById('new-m-pwd').value.trim();
            const r = document.getElementById('new-m-role').value;
            if(!u || !p) return alert("Compila i campi!");
            const { error } = await supabaseClient.from('domochi_admins').insert([{ username: u, password: p, role: r }]);
            if(error) alert(error.message); else { alert("Staff aggiunto!"); fetchStaffList(); }
        }
        window.updateStaffRole = async (id, newRole) => {
            const { error } = await supabaseClient.from('domochi_admins').update({ role: newRole }).eq('id', id);
            if(error) alert(error.message); else { alert("Ruolo aggiornato!"); fetchStaffList(); }
        }
        window.deleteStaff = async (id) => {
            if(!confirm("Sicuro?")) return;
            const { error } = await supabaseClient.from('domochi_admins').delete().eq('id', id);
            if(error) alert(error.message); else fetchStaffList();
        }
        async function updateMyPassword() {
            const oldP = document.getElementById('my-old-pass').value;
            const newP = document.getElementById('my-new-pass').value;
            const user = sessionStorage.getItem('admin_user');
            const { data } = await supabaseClient.from('domochi_admins').select('*').eq('username', user).eq('password', oldP).single();
            if(!data) return alert("Vecchia password errata!");
            const { error } = await supabaseClient.from('domochi_admins').update({ password: newP }).eq('username', user);
            if(error) alert(error.message); else { alert("Password aggiornata! Effettua nuovamente il login."); handleLogout(); }
        }

        // --- 基础设置逻辑 ---
        async function fetchCMSSettings() {
            const { data } = await supabaseClient.from('domochi_settings').select('*');
            if(data) {
                const h = data.find(x => x.setting_key === 'custom_hours');
                const f = data.find(x => x.setting_key === 'footer_notice');
                if(h) { document.getElementById('set-h-it').value = h.value_it; document.getElementById('set-h-en').value = h.value_en; }
                if(f) { document.getElementById('set-footer-it').value = f.value_it; document.getElementById('set-footer-en').value = f.value_en; }
            }
        }
        async function saveCMSSettings() {
            await supabaseClient.from('domochi_settings').upsert([
                { setting_key: 'custom_hours', value_it: document.getElementById('set-h-it').value, value_en: document.getElementById('set-h-en').value },
                { setting_key: 'footer_notice', value_it: document.getElementById('set-footer-it').value, value_en: document.getElementById('set-footer-en').value }
            ]);
            alert("Salvato!");
        }

        // --- 保存产品逻辑 ---
async function saveProduct() {
    const nameIt = document.getElementById('prod-name-it').value.trim();
    if(!nameIt) return alert("Errore: Il nome è vuoto!");

    // 1. 获取基础数据
    const payload = {
        category: document.getElementById('prod-cat').value,
        subcategory: document.getElementById('prod-subcat').value,
        name_it: nameIt,
        name_en: document.getElementById('prod-name-en').value.trim(),
        description_it: document.getElementById('prod-desc-it').value.trim(),
        description_en: document.getElementById('prod-desc-en').value.trim(),
        sort_order: parseInt(document.getElementById('prod-sort').value) || 0,
        allergens: Array.from(document.querySelectorAll('.alg-cb:checked')).map(cb => cb.value).join(', '),
        is_vegan: document.getElementById('prod-vegan').checked,
        is_hot: document.getElementById('prod-hot').checked,
        is_cold: document.getElementById('prod-cold').checked,
        is_new: document.getElementById('prod-isnew').checked,
        is_available: document.getElementById('prod-isav').checked
    };

    // 2. 打印看看 Payload 到底长什么样
    console.log("准备发送的 Payload:", JSON.stringify(payload, null, 2));

    try {
        // 3. 处理图片（如果图片上传有问题，先暂时跳过图片测试）
        const file = document.getElementById('prod-img').files[0];
        if (file) {
            const fname = `item_${Date.now()}.${file.name.split('.').pop()}`;
            const { error: uploadErr } = await supabaseClient.storage.from('domochi-assets').upload(fname, file);
            if (uploadErr) throw uploadErr;
            const { data } = supabaseClient.storage.from('domochi-assets').getPublicUrl(fname);
            payload.image_url = data.publicUrl;
        }

        // 4. 执行插入
        console.log("开始插入数据库...");
        const { data, error } = currentEditProductId 
            ? await supabaseClient.from('domochi_products').update(payload).eq('id', currentEditProductId)
            : await supabaseClient.from('domochi_products').insert([payload]);

        if (error) {
            console.error("数据库报错详情:", error);
            alert("数据库插入失败: " + error.message);
        } else {
            alert("✅ 保存成功！");
            resetProductForm();
            fetchCMSProducts();
        }
    } catch(e) { 
        alert("系统错误: " + e.message); 
    }
}

        window.editProduct = (id) => {
            currentEditProductId = id;
            const p = allProductsCache.find(x => x.id === id);
            document.getElementById('prod-cat').value = p.category;
            updateSubcatDropdown();
            document.getElementById('prod-subcat').value = p.subcategory || '';
            document.getElementById('prod-name-it').value = p.name_it;
            document.getElementById('prod-name-en').value = p.name_en || '';
            document.getElementById('prod-desc-it').value = p.description_it || ''; 
            document.getElementById('prod-desc-en').value = p.description_en || ''; 
            document.getElementById('prod-sort').value = p.sort_order || 0;
            document.getElementById('prod-hot').checked = p.is_hot;
            document.getElementById('prod-cold').checked = p.is_cold;
            document.getElementById('prod-vegan').checked = p.is_vegan;
            document.querySelectorAll('.alg-cb').forEach(c => c.checked = p.allergens && p.allergens.includes(c.value));
            document.getElementById('prod-form-title').innerText = "Modifica: " + p.name_it;
            window.scrollTo(0,0);
        };

        window.deleteProduct = async (id) => { if(confirm("Del?")) { await supabaseClient.from('domochi_products').delete().eq('id', id); fetchCMSProducts(); } };

        // --- Promo Slider 逻辑 (更新版：支持 Subtitle 与 实时修改笔记) ---
        async function fetchCMSPromos() {
            const { data } = await supabaseClient.from('domochi_promos').select('*').order('id', { ascending: false });
            document.getElementById('promo-list-view').innerHTML = (data || []).map(p => `
                <div class="list-card">
                    <img src="${p.image_url}" class="list-img">
                    <div style="flex:1;">
                        <b>${p.title}</b><br>
                        <input type="text" value="${p.subtitle || ''}" class="cms-input" style="margin:5px 0; padding:5px; height:auto; font-size:0.85rem;" 
                               placeholder="Modifica Sottotitolo/Nota (回车保存)" onchange="updatePromoNote(${p.id}, this.value)">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="action-btn" onclick="togglePromo(${p.id}, ${!p.is_active})">${p.is_active?'Hide':'Show'}</button>
                        <button class="action-btn" style="background:#DF4F53; color:white;" onclick="delPromo(${p.id})">Del</button>
                    </div>
                </div>`).join('');
        }

        async function uploadPromo() {
            const f = document.getElementById('prm-file-input').files[0];
            if(!f) return alert("Select File!");
            const fname = `prm_${Date.now()}.${f.name.split('.').pop()}`;
            await supabaseClient.storage.from('domochi-assets').upload(fname, f);
            const url = supabaseClient.storage.from('domochi-assets').getPublicUrl(fname).data.publicUrl;
            const payload = { 
                image_url: url, 
                title: document.getElementById('prm-title-input').value, 
                subtitle: document.getElementById('prm-sub-input').value, // 读取副标题
                tag_text: document.getElementById('prm-tag-input').value, 
                is_active: true 
            };
            await supabaseClient.from('domochi_promos').insert([payload]);
            alert("Promo OK!"); fetchCMSPromos();
        }

        window.updatePromoNote = async (id, newNote) => {
            const { error } = await supabaseClient.from('domochi_promos').update({ subtitle: newNote }).eq('id', id);
            if(error) alert(error.message); else console.log("Nota salvata.");
        }

        window.togglePromo = async (id, s) => { await supabaseClient.from('domochi_promos').update({ is_active: s }).eq('id', id); fetchCMSPromos(); };
        window.delPromo = async (id) => { if(confirm("Del?")) { await supabaseClient.from('domochi_promos').delete().eq('id', id); fetchCMSPromos(); } };

        window.resetProductForm = () => { 
            currentEditProductId = null; document.getElementById('prod-form-title').innerText="Aggiungi Prodotto"; 
            document.getElementById('prod-name-it').value=''; document.getElementById('prod-name-en').value=''; 
            document.getElementById('prod-desc-it').value=''; document.getElementById('prod-desc-en').value=''; 
            document.getElementById('prod-sort').value='0'; document.getElementById('prod-img').value=''; document.querySelectorAll('input[type="checkbox"]').forEach(c=>c.checked=false); 
            document.getElementById('prod-isav').checked=true; updateSubcatDropdown(); 
        };

        window.handleLogout = () => { sessionStorage.clear(); window.location.reload(); }
    </script>
</body>
</html>
