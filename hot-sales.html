<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Sales | Dōmochi CMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-primary: #DF4F53; 
            --brand-secondary: #FDEEDC; 
            --text-main: #4A3B32; 
            --bg-admin: #F8F9FA;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-admin); color: var(--text-main); padding-bottom: 50px; }

        .page-header { background: var(--white); padding: 20px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 20px; }
        .back-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #eee; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: var(--transition); color: var(--text-main); text-decoration: none;}
        .back-btn:hover { background: var(--brand-primary); color: white; }

        .container { max-width: 1000px; margin: 25px auto; padding: 0 20px; }

        /* --- 筛选栏 --- */
        .filter-section { background: white; padding: 25px; border-radius: 24px; box-shadow: var(--shadow); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 0.8rem; font-weight: 800; color: #aaa; text-transform: uppercase; }
        .form-input { padding: 12px 15px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 0.95rem; outline: none; background: #fafafa; }
        
        .btn-analyze { background: var(--brand-primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; height: 48px; }
        .btn-analyze:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(223, 79, 83, 0.3); }

        /* --- 分类业绩简报 --- */
        .category-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .cat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); text-align: center; }
        .cat-card i { font-size: 1.5rem; margin-bottom: 10px; display: block; }
        .cat-card h4 { font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        .cat-card .val { font-size: 1.4rem; font-weight: 800; color: var(--brand-primary); }

        /* --- 排行榜列表 --- */
        .ranking-section { background: white; padding: 30px; border-radius: 24px; box-shadow: var(--shadow); }
        .ranking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .ranking-header h2 { font-size: 1.2rem; font-weight: 800; }
        
        .toggle-group { display: flex; background: #eee; padding: 4px; border-radius: 10px; }
        .toggle-btn { padding: 6px 15px; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: transparent; color: #888; }
        .toggle-btn.active { background: white; color: var(--brand-primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .rank-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .rank-number { width: 30px; font-weight: 900; color: #ddd; font-size: 1.2rem; text-align: center; }
        .rank-item:nth-child(1) .rank-number { color: #FFD700; } /* 金 */
        .rank-item:nth-child(2) .rank-number { color: #C0C0C0; } /* 银 */
        .rank-item:nth-child(3) .rank-number { color: #CD7F32; } /* 铜 */

        .rank-info { flex: 1; }
        .rank-name-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 700; font-size: 0.95rem; }
        .rank-bar-bg { width: 100%; height: 8px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }
        .rank-bar-fill { height: 100%; background: var(--brand-primary); border-radius: 10px; transition: width 1s ease-in-out; width: 0; }

        .empty-state { text-align: center; padding: 60px; color: #ccc; }
    </style>
</head>
<body>

    <header class="page-header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 style="font-size: 1.2rem; font-weight: 800; color: var(--brand-primary);">Hot Sales Analysis (热销排行)</h1>
    </header>

    <main class="container">
        
        <!-- 1. 筛选时间段 -->
        <section class="filter-section">
            <div class="filter-group">
                <label>Dal (开始日期)</label>
                <input type="date" id="date-from" class="form-input">
            </div>
            <div class="filter-group">
                <label>Al (结束日期)</label>
                <input type="date" id="date-to" class="form-input">
            </div>
            <button onclick="analyzeSales()" class="btn-analyze">
                <i class="fa-solid fa-chart-line"></i> ANALIZZA (分析)
            </button>
        </section>

        <!-- 2. 品类业绩简报 -->
        <section class="category-stats" id="category-summary">
            <div class="cat-card">
                <i class="fa-solid fa-cookie" style="color:#fa8c16"></i>
                <h4>Mochi</h4>
                <div class="val" id="sum-mochi">0</div>
            </div>
            <div class="cat-card">
                <i class="fa-solid fa-mug-hot" style="color:#1890ff"></i>
                <h4>Drinks</h4>
                <div class="val" id="sum-drinks">0</div>
            </div>
            <div class="cat-card">
                <i class="fa-solid fa-ice-cream" style="color:#52c41a"></i>
                <h4>Desserts</h4>
                <div class="val" id="sum-desserts">0</div>
            </div>
        </section>

        <!-- 3. 排行榜 -->
        <section class="ranking-section">
            <div class="ranking-header">
                <h2 id="ranking-title">Top 10 Prodotti (销量排行)</h2>
                <div class="toggle-group">
                    <button class="toggle-btn active" id="mode-qty" onclick="changeMode('qty')">Sales Qty</button>
                    <button class="toggle-btn" id="mode-rev" onclick="changeMode('rev')">Revenue</button>
                </div>
            </div>

            <div id="ranking-container">
                <!-- 动态载入排行 -->
                <p class="empty-state">Inserisci le date per visualizzare i dati.</p>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://thulheyvwmfwfhhfjktk.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRodWxoZXl2d21md2ZoaGZqa3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODMyNzYsImV4cCI6MjA5ODU1OTI3Nn0.cX2-vmJ8TdXvUN-fjx6ufW1fUgklG4kZXsQhdwlHeTQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentData = [];
        let sortMode = 'qty'; // 'qty' 或 'rev'

        window.onload = () => {
            if (!sessionStorage.getItem('domochi_admin')) window.location.href = 'index.html';
            
            // 默认查最近 30 天
            const today = new Date();
            const lastMonth = new Date();
            lastMonth.setDate(today.getDate() - 30);
            
            document.getElementById('date-from').value = lastMonth.toISOString().split('T')[0];
            document.getElementById('date-to').value = today.toISOString().split('T')[0];
            
            analyzeSales();
        };

        async function analyzeSales() {
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;
            const container = document.getElementById('ranking-container');

            container.innerHTML = '<p class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Elaborazione dati...</p>';

            const { data, error } = await supabaseClient
                .from('domochi_orders')
                .select('order_data')
                .gte('created_at', `${dateFrom}T00:00:00`)
                .lte('created_at', `${dateTo}T23:59:59`);

            if (data) {
                processData(data);
            }
        }

        function processData(orders) {
            const productMap = {};
            const categoryMap = { "mochi": 0, "drinks": 0, "desserts": 0 };

            orders.forEach(order => {
                const items = order.order_data.items || [];
                items.forEach(item => {
                    const name = item.name;
                    const qty = parseInt(item.qty) || 0;
                    const price = parseFloat(item.price) || 0;
                    const rev = qty * price;

                    // 统计产品
                    if (!productMap[name]) {
                        productMap[name] = { qty: 0, rev: 0 };
                    }
                    productMap[name].qty += qty;
                    productMap[name].rev += rev;

                    // 统计分类 (基于简单的关键词或逻辑，如果 item 包含分类信息更好)
                    // 这里由于历史订单 JSON 可能没存 category，我们可以通过简单的映射或忽略
                    // 假设我们在前端点单时存了 category 字段：
                    if(item.category) {
                        const c = item.category.toLowerCase();
                        if(categoryMap.hasOwnProperty(c)) categoryMap[c] += qty;
                    }
                });
            });

            // 转换成数组
            currentData = Object.keys(productMap).map(name => ({
                name: name,
                qty: productMap[name].qty,
                rev: productMap[name].rev
            }));

            // 更新分类简报
            document.getElementById('sum-mochi').innerText = categoryMap.mochi;
            document.getElementById('sum-drinks').innerText = categoryMap.drinks;
            document.getElementById('sum-desserts').innerText = categoryMap.desserts;

            renderRanking();
        }

        function changeMode(mode) {
            sortMode = mode;
            document.getElementById('mode-qty').classList.toggle('active', mode === 'qty');
            document.getElementById('mode-rev').classList.toggle('active', mode === 'rev');
            document.getElementById('ranking-title').innerText = mode === 'qty' ? 'Top Prodotti (销量排行)' : 'Top Prodotti (销售额排行)';
            renderRanking();
        }

        function renderRanking() {
            const container = document.getElementById('ranking-container');
            if (currentData.length === 0) {
                container.innerHTML = '<p class="empty-state">Nessun dato per questo periodo.</p>';
                return;
            }

            // 排序
            currentData.sort((a, b) => b[sortMode] - a[sortMode]);

            // 取前 10
            const top10 = currentData.slice(0, 10);
            const maxVal = top10[0][sortMode];

            container.innerHTML = top10.map((item, index) => {
                const val = sortMode === 'qty' ? item.qty : `€ ${item.rev.toFixed(2)}`;
                const percentage = (item[sortMode] / maxVal) * 100;

                return `
                    <div class="rank-item">
                        <div class="rank-number">${index + 1}</div>
                        <div class="rank-info">
                            <div class="rank-name-row">
                                <span>${item.name}</span>
                                <span>${val}</span>
                            </div>
                            <div class="rank-bar-bg">
                                <div class="rank-bar-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
