<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | Dōmochi CMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-primary: #DF4F53; 
            --brand-secondary: #FDEEDC; 
            --text-main: #4A3B32; 
            --bg-admin: #F8F9FA;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-admin); color: var(--text-main); padding-bottom: 50px; }

        /* --- Header --- */
        .page-header { background: var(--white); padding: 20px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 20px; }
        .back-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #eee; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: var(--transition); color: var(--text-main); text-decoration: none;}
        .back-btn:hover { background: var(--brand-primary); color: white; }

        .container { max-width: 1000px; margin: 25px auto; padding: 0 20px; }

        /* --- 统计简报 --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stats-card { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); border-left: 6px solid var(--brand-primary); }
        .stats-card h4 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stats-card .value { font-size: 1.8rem; font-weight: 800; color: var(--brand-primary); }

        /* --- 筛选栏 --- */
        .filter-section { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { font-size: 0.85rem; font-weight: 700; color: #888; }
        .form-select, .form-input { padding: 10px 15px; border: 2px solid #f0f0f0; border-radius: 10px; font-size: 0.9rem; outline: none; background: #fafafa; }

        /* --- 历史列表 --- */
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; transition: 0.3s; }
        .history-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .order-id { font-weight: 800; font-size: 1.1rem; }
        .order-time { font-size: 0.8rem; color: #aaa; margin-top: 2px; }
        .mode-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; color: white; text-transform: uppercase; }
        
        /* 就餐颜色 */
        .mode-qui { background: #52c41a; }
        .mode-asporto { background: #1890ff; }
        .mode-ritiro { background: #faad14; }

        .card-body { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .items-list { font-size: 0.9rem; line-height: 1.6; }
        .items-list span { color: var(--brand-primary); font-weight: 700; margin-right: 5px; }
        
        .customer-info { font-size: 0.85rem; color: #666; border-left: 2px solid var(--brand-secondary); padding-left: 15px; }
        .customer-info p { margin-bottom: 4px; }
        .notes-box { background: #fffbe6; padding: 8px 12px; border-radius: 8px; margin-top: 10px; font-size: 0.8rem; border-left: 4px solid #faad14; color: #856404; }

        .card-footer { margin-top: 15px; display: flex; justify-content: flex-end; align-items: center; }
        .total-amount { font-size: 1.2rem; font-weight: 800; color: var(--brand-primary); }

        @media (max-width: 600px) {
            .card-body { grid-template-columns: 1fr; }
            .customer-info { border-left: none; border-top: 1px solid #f0f0f0; padding: 15px 0 0; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="page-header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 style="font-size: 1.2rem; font-weight: 800; color: var(--brand-primary);">Order History (点单历史)</h1>
    </header>

    <main class="container">
        
        <!-- 1. 统计概览 -->
        <section class="stats-grid">
            <div class="stats-card">
                <h4>Ordini Totali (总单数)</h4>
                <div class="value" id="total-orders-count">0</div>
            </div>
            <div class="stats-card">
                <h4>Totale Incassato (总营业额)</h4>
                <div class="value" id="total-revenue-value">€ 0.00</div>
            </div>
        </section>

        <!-- 2. 筛选器 -->
        <section class="filter-section">
            <div class="filter-group">
                <label>Data (日期)</label>
                <input type="date" id="filter-date" class="form-input" onchange="fetchHistory()">
            </div>
            <div class="filter-group">
                <label>Modalità (方式)</label>
                <select id="filter-mode" class="form-select" onchange="fetchHistory()">
                    <option value="all">Tutti (全部)</option>
                    <option value="Consuma qui">Consuma qui (堂食)</option>
                    <option value="Da asporto">Da asporto (打包)</option>
                    <option value="Ritiro in negozio">Ritiro in negozio (自提)</option>
                </select>
            </div>
            <button onclick="setToday()" class="form-input" style="cursor:pointer; background:var(--brand-secondary); border-color:var(--brand-accent); font-weight:700;">OGGI (今天)</button>
        </section>

        <!-- 3. 历史列表 -->
        <div class="history-list" id="history-container">
            <!-- 动态载入 -->
            <p style="text-align:center; color:#aaa;">Caricamento...</p>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://thulheyvwmfwfhhfjktk.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRodWxoZXl2d21md2ZoaGZqa3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODMyNzYsImV4cCI6MjA5ODU1OTI3Nn0.cX2-vmJ8TdXvUN-fjx6ufW1fUgklG4kZXsQhdwlHeTQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = () => {
            if (!sessionStorage.getItem('domochi_admin')) window.location.href = 'index.html';
            setToday(); // 默认显示今天
        };

        function setToday() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filter-date').value = today;
            fetchHistory();
        }

        async function fetchHistory() {
            const date = document.getElementById('filter-date').value;
            const mode = document.getElementById('filter-mode').value;
            const container = document.getElementById('history-container');
            
            container.innerHTML = '<p style="text-align:center; padding:20px;">Caricamento...</p>';

            // 构造查询：筛选日期
            // 数据库 created_at 是带时间的，所以我们需要查询整个日期间隔
            let query = supabaseClient
                .from('domochi_orders')
                .select('*')
                .gte('created_at', `${date}T00:00:00`)
                .lte('created_at', `${date}T23:59:59`)
                .order('created_at', { ascending: false });

            const { data, error } = await query;

            if (data) {
                // 前端根据就餐方式过滤 (因为 dining_option 在 JSON 里面，直接用 eq 比较复杂，前端过滤更灵活)
                const filteredData = mode === 'all' 
                    ? data 
                    : data.filter(o => o.order_data.dining_option === mode);

                renderList(filteredData);
                calculateStats(filteredData);
            }
        }

        function renderList(orders) {
            const container = document.getElementById('history-container');
            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px; color:#ccc;"><i class="fa-solid fa-box-open fa-3x"></i><p style="margin-top:15px;">Nessun ordine trovato.</p></div>';
                return;
            }

            container.innerHTML = orders.map(order => {
                const info = order.order_data.customer_info || {};
                const items = order.order_data.items || [];
                const rawDate = new Date(order.created_at);
                const timeStr = rawDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                let modeClass = 'mode-qui';
                if(order.order_data.dining_option.includes('asporto')) modeClass = 'mode-asporto';
                if(order.order_data.dining_option.includes('ritiro')) modeClass = 'mode-ritiro';

                return `
                    <div class="history-card">
                        <div class="card-header">
                            <div>
                                <span class="order-id">#${order.order_number || order.id}</span>
                                <div class="order-time"><i class="fa-regular fa-clock"></i> ${timeStr}</div>
                            </div>
                            <span class="mode-badge ${modeClass}">${order.order_data.dining_option}</span>
                        </div>
                        <div class="card-body">
                            <div class="items-list">
                                ${items.map(i => `<p><span>${i.qty}x</span> ${i.name}</p>`).join('')}
                                ${info.notes ? `<div class="notes-box"><strong>Nota:</strong> ${info.notes}</div>` : ''}
                            </div>
                            <div class="customer-info">
                                <p><i class="fa-solid fa-user"></i> <strong>${info.name || 'N/A'}</strong></p>
                                <p><i class="fa-solid fa-phone"></i> ${info.phone || 'N/A'}</p>
                                <p><i class="fa-solid fa-circle-check" style="color:#52c41a"></i> Status: ${order.status}</p>
                            </div>
                        </div>
                        <div class="card-footer">
                            <div class="total-amount">€ ${parseFloat(order.total_amount).toFixed(2)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateStats(orders) {
            const count = orders.length;
            const revenue = orders.reduce((sum, order) => sum + parseFloat(order.total_amount), 0);
            
            document.getElementById('total-orders-count').innerText = count;
            document.getElementById('total-revenue-value').innerText = `€ ${revenue.toFixed(2)}`;
        }
    </script>
</body>
</html>
