<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | Dōmochi CMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-primary: #DF4F53; 
            --brand-secondary: #FDEEDC; 
            --text-main: #4A3B32; 
            --bg-admin: #F8F9FA;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-admin); color: var(--text-main); padding-bottom: 50px; }

        /* --- Header --- */
        .page-header { background: var(--white); padding: 20px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 20px; }
        .back-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #eee; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: var(--transition); color: var(--text-main); text-decoration: none;}
        .back-btn:hover { background: var(--brand-primary); color: white; }

        .container { max-width: 1100px; margin: 25px auto; padding: 0 20px; }

        /* --- 统计简报 (改为3列) --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stats-card { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); border-left: 6px solid var(--brand-primary); }
        .stats-card h4 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
        .stats-card .value { font-size: 1.6rem; font-weight: 800; color: var(--brand-primary); }

        /* --- 筛选栏 (增强范围查询) --- */
        .filter-section { background: white; padding: 25px; border-radius: 24px; box-shadow: var(--shadow); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 0.8rem; font-weight: 800; color: #aaa; text-transform: uppercase; }
        .form-select, .form-input { padding: 12px 15px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 0.95rem; outline: none; background: #fafafa; transition: 0.3s; }
        .form-input:focus { border-color: var(--brand-primary); background: white; }

        .btn-search { background: var(--brand-primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; height: 48px; display: flex; align-items: center; gap: 8px; }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(223, 79, 83, 0.3); }

        /* --- 历史列表 --- */
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 15px; }
        .order-id { font-weight: 900; font-size: 1.2rem; color: var(--brand-primary); }
        .order-date { font-size: 0.85rem; color: #4A3B32; font-weight: 600; }
        .order-time { font-size: 0.8rem; color: #aaa; }
        
        .mode-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; color: white; }
        .mode-qui { background: #52c41a; }
        .mode-asporto { background: #1890ff; }
        .mode-ritiro { background: #faad14; }

        .card-body { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        .items-list p { margin-bottom: 6px; font-size: 0.95rem; }
        .items-list span { color: var(--brand-primary); font-weight: 800; margin-right: 8px; background: var(--brand-secondary); padding: 2px 8px; border-radius: 6px; }
        
        .customer-info { font-size: 0.9rem; background: #fdfaf6; padding: 15px; border-radius: 15px; }
        .customer-info p { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .customer-info i { color: var(--brand-primary); width: 16px; }

        .card-footer { margin-top: 15px; padding-top: 10px; display: flex; justify-content: flex-end; align-items: center; font-size: 1.3rem; font-weight: 900; color: var(--brand-primary); }

        @media (max-width: 768px) {
            .card-body { grid-template-columns: 1fr; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .btn-search { justify-content: center; }
        }
    </style>
</head>
<body>

    <header class="page-header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 style="font-size: 1.2rem; font-weight: 800; color: var(--brand-primary);">Registro Ordini (点单历史)</h1>
    </header>

    <main class="container">
        
        <!-- 1. 统计简报 -->
        <section class="stats-grid">
            <div class="stats-card">
                <h4>Ordini (总单数)</h4>
                <div class="value" id="stat-count">0</div>
            </div>
            <div class="stats-card">
                <h4>Totale (总营业额)</h4>
                <div class="value" id="stat-revenue">€ 0.00</div>
            </div>
            <div class="stats-card">
                <h4>Media (订单均价)</h4>
                <div class="value" id="stat-avg">€ 0.00</div>
            </div>
        </section>

        <!-- 2. 增强筛选栏 -->
        <section class="filter-section">
            <div class="filter-group">
                <label>Dal (从)</label>
                <input type="date" id="date-from" class="form-input">
            </div>
            <div class="filter-group">
                <label>Al (到)</label>
                <input type="date" id="date-to" class="form-input">
            </div>
            <div class="filter-group" style="flex: 1;">
                <label>Modalità (就餐方式)</label>
                <select id="filter-mode" class="form-select">
                    <option value="all">Tutte le modalità (全部)</option>
                    <option value="Consuma qui">Consuma qui (堂食)</option>
                    <option value="Da asporto">Da asporto (打包)</option>
                    <option value="Ritiro in negozio">Ritiro in negozio (自提)</option>
                </select>
            </div>
            <button onclick="fetchHistory()" class="btn-search">
                <i class="fa-solid fa-magnifying-glass"></i> CERCA (查询)
            </button>
        </section>

        <!-- 3. 历史列表 -->
        <div class="history-list" id="history-container">
            <!-- 动态载入 -->
            <p style="text-align:center; color:#aaa; padding:40px;">Seleziona le date e premi Cerca.</p>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://thulheyvwmfwfhhfjktk.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRodWxoZXl2d21md2ZoaGZqa3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODMyNzYsImV4cCI6MjA5ODU1OTI3Nn0.cX2-vmJ8TdXvUN-fjx6ufW1fUgklG4kZXsQhdwlHeTQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = () => {
            if (!sessionStorage.getItem('domochi_admin')) window.location.href = 'index.html';
            
            // 默认设置日期范围为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-from').value = today;
            document.getElementById('date-to').value = today;
            
            fetchHistory();
        };

        async function fetchHistory() {
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;
            const mode = document.getElementById('filter-mode').value;
            const container = document.getElementById('history-container');
            
            if(!dateFrom || !dateTo) return alert("Seleziona le date!");

            container.innerHTML = '<p style="text-align:center; padding:40px;"><i class="fa-solid fa-spinner fa-spin"></i> Caricamento...</p>';

            // 构造跨度查询
            // gte: 开始日期的 00:00:00
            // lte: 结束日期的 23:59:59
            let query = supabaseClient
                .from('domochi_orders')
                .select('*')
                .gte('created_at', `${dateFrom}T00:00:00`)
                .lte('created_at', `${dateTo}T23:59:59`)
                .order('created_at', { ascending: false });

            const { data, error } = await query;

            if (error) {
                container.innerHTML = `<p style="color:red; text-align:center;">Errore: ${error.message}</p>`;
                return;
            }

            // 前端过滤就餐方式
            const filteredData = mode === 'all' 
                ? data 
                : data.filter(o => o.order_data.dining_option === mode);

            renderList(filteredData);
            calculateStats(filteredData);
        }

        function renderList(orders) {
            const container = document.getElementById('history-container');
            if (orders.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:80px; color:#ccc;">
                        <i class="fa-solid fa-receipt fa-4x" style="margin-bottom:20px; opacity:0.5;"></i>
                        <p>Nessun ordine trovato in questo intervallo.</p>
                    </div>`;
                return;
            }

            container.innerHTML = orders.map(order => {
                const info = order.order_data.customer_info || {};
                const items = order.order_data.items || [];
                const createdAt = new Date(order.created_at);
                
                // 格式化日期和时间
                const dateStr = createdAt.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const timeStr = createdAt.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                
                let modeClass = 'mode-qui';
                if(order.order_data.dining_option.includes('asporto')) modeClass = 'mode-asporto';
                if(order.order_data.dining_option.includes('ritiro')) modeClass = 'mode-ritiro';

                return `
                    <div class="history-card">
                        <div class="card-header">
                            <div>
                                <span class="order-id">#${order.order_number || order.id}</span>
                                <div class="order-date">${dateStr} <span class="order-time">${timeStr}</span></div>
                            </div>
                            <span class="mode-badge ${modeClass}">${order.order_data.dining_option}</span>
                        </div>
                        <div class="card-body">
                            <div class="items-list">
                                ${items.map(i => `<p><span>${i.qty}</span> ${i.name}</p>`).join('')}
                                ${info.notes ? `
                                    <div style="background:#fffbe6; padding:10px; border-radius:10px; margin-top:10px; font-size:0.8rem; border-left:4px solid #faad14;">
                                        <strong>Nota:</strong> ${info.notes}
                                    </div>` : ''}
                            </div>
                            <div class="customer-info">
                                <p><i class="fa-solid fa-user"></i> <strong>${info.name || 'N/A'}</strong></p>
                                <p><i class="fa-solid fa-phone"></i> ${info.phone || 'N/A'}</p>
                                <p><i class="fa-solid fa-check-double" style="color:#52c41a"></i> Status: ${order.status}</p>
                            </div>
                        </div>
                        <div class="card-footer">
                            Totale: € ${parseFloat(order.total_amount).toFixed(2)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateStats(orders) {
            const count = orders.length;
            const revenue = orders.reduce((sum, order) => sum + parseFloat(order.total_amount), 0);
            const avg = count > 0 ? (revenue / count) : 0;
            
            document.getElementById('stat-count').innerText = count;
            document.getElementById('stat-revenue').innerText = `€ ${revenue.toFixed(2)}`;
            document.getElementById('stat-avg').innerText = `€ ${avg.toFixed(2)}`;
        }
    </script>
</body>
</html>
